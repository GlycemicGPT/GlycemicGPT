---
# Kubernetes Deployment Manifests
# Redis for caching and session management
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glycemicgpt-redis
  namespace: glycemicgpt
  labels:
    app.kubernetes.io/name: glycemicgpt
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glycemicgpt
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glycemicgpt
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          env:
            # Inject a non-empty REDIS_PASSWORD (and matching credentials in the
            # REDIS_URL secret) to require auth. Optional so the manifest still
            # applies before the secret is populated; populate it in production.
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: glycemicgpt-secrets
                  key: REDIS_PASSWORD
                  optional: true
          command:
            - sh
            - -c
            # Enable --requirepass only when REDIS_PASSWORD is non-empty.
            - |
              if [ -n "$REDIS_PASSWORD" ]; then
                exec redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass "$REDIS_PASSWORD"
              else
                exec redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
              fi
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                # Authenticate only when a password is set; an empty
                # REDISCLI_AUTH makes redis-cli attempt AUTH against a
                # passwordless server (noisy stderr).
                - if [ -n "$REDIS_PASSWORD" ]; then export REDISCLI_AUTH="$REDIS_PASSWORD"; fi; redis-cli ping | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - if [ -n "$REDIS_PASSWORD" ]; then export REDISCLI_AUTH="$REDIS_PASSWORD"; fi; redis-cli ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: glycemicgpt-redis
  namespace: glycemicgpt
  labels:
    app.kubernetes.io/name: glycemicgpt
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app.kubernetes.io/name: glycemicgpt
    app.kubernetes.io/component: cache
