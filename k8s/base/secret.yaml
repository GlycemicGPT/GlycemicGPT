---
# Kubernetes Deployment Manifests
# Secret template for sensitive data
# NOTE: Replace placeholder values before applying!
# Consider using External Secrets Operator or sealed-secrets in production
apiVersion: v1
kind: Secret
metadata:
  name: glycemicgpt-secrets
  namespace: glycemicgpt
  labels:
    app.kubernetes.io/name: glycemicgpt
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database password. Inject at deploy time (overlay patch, secret manager,
  # External Secrets, SealedSecrets, or `kubectl create secret`).
  DATABASE_PASSWORD: ""

  # Secret key for session encryption. Inject at deploy time. Generate with:
  # openssl rand -hex 32
  SECRET_KEY: ""

  # Full database URL. Inject at deploy time, e.g.:
  # postgresql+asyncpg://glycemicgpt:<DB-PASSWORD>@glycemicgpt-db:5432/glycemicgpt
  DATABASE_URL: ""

  # Redis password. Inject a strong value to require Redis auth (the Redis
  # Deployment enables --requirepass only when this is non-empty). Generate
  # with: openssl rand -hex 32. Leave empty only for throwaway clusters.
  REDIS_PASSWORD: ""

  # Full Redis URL. When REDIS_PASSWORD is set, REDIS_URL must carry that same
  # password as its URL password component (empty username before the colon);
  # see docs/install/kubernetes.md for the exact form. Otherwise the API gets
  # NOAUTH errors.
  REDIS_URL: "redis://glycemicgpt-redis:6379/0"

  # AI Sidecar API key - shared between API and sidecar for internal auth.
  # Inject at deploy time (via overlay patch, secret manager, External Secrets,
  # SealedSecrets, or `kubectl create secret`). The sidecar REFUSES TO START
  # with an empty key (it will crash-loop until one is provided), so the empty
  # default below is a placeholder, not a working configuration.
  # Generate the value with: openssl rand -hex 32
  SIDECAR_API_KEY: ""

  # Sentry DSNs -- OPTIONAL, OFF when empty. One per service (each its own Sentry
  # project). Inject at deploy time (overlay patch / External Secrets / SealedSecrets);
  # never commit real values, never bake into an image. The web DSN is server-side
  # only. See PRIVACY.md.
  GLYCEMICGPT_SENTRY_DSN: ""
  GLYCEMICGPT_SIDECAR_SENTRY_DSN: ""
  GLYCEMICGPT_WEB_SENTRY_DSN: ""

  # AI API Keys (optional - configure as needed)
  # ANTHROPIC_API_KEY: ""
  # OPENAI_API_KEY: ""

  # Telegram Bot Token (optional)
  # TELEGRAM_BOT_TOKEN: ""
