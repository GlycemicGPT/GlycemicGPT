name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Path-filter PRs so we don't spin up VMs for components that didn't
  # change. On push to main/develop the gated jobs always run -- skipping
  # is PR-only.
  #
  # Each gateable job has `needs: detect-changes` + a fail-open `if:`:
  #   if: |
  #     !cancelled()
  #     && (
  #       needs.detect-changes.result != 'success'
  #       || needs.detect-changes.outputs.<flag> == 'true'
  #       || github.event_name == 'push'
  #     )
  #
  # When the inner expression evaluates false, GitHub reports the job as
  # "skipped" and that DOES satisfy the required-status-check rule on
  # develop.
  #
  # The `!cancelled()` prefix is load-bearing. GitHub Actions implicitly
  # applies `success()` to job-level `if` conditions, which means a job
  # with `needs:` whose upstream FAILED would short-circuit the entire
  # `if` to false (regardless of what the inner expression evaluates to)
  # and report as "dependent job failed" -- a FAILURE for required-check
  # purposes. `!cancelled()` overrides the implicit `success()` so the
  # inner expression is honored even when `detect-changes` failed,
  # letting the dependent job run unconditionally and report its own
  # real result. (`!cancelled()` is preferred over `always()` because
  # we still want to skip if the workflow itself was cancelled.)
  detect-changes:
    name: Detect Component Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      sidecar: ${{ steps.filter.outputs.sidecar }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          # Mirrors the path semantics in security-scan.yml so contributors
          # only have one mental model. Anything inside apps/api/** triggers
          # backend; anything inside apps/web/** triggers frontend; etc.
          # Tests and lockfiles are co-located under those trees so no
          # extra patterns are needed.
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            sidecar:
              - 'sidecar/**'

  test-backend:
    name: Backend Tests
    needs: detect-changes
    if: |
      !cancelled()
      && (
        needs.detect-changes.result != 'success'
        || needs.detect-changes.outputs.api == 'true'
        || github.event_name == 'push'
      )
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: glycemicgpt
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: glycemicgpt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://glycemicgpt:testpassword@localhost:5432/glycemicgpt_test
        run: uv run alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://glycemicgpt:testpassword@localhost:5432/glycemicgpt_test
          TESTING: "true"
          JWT_SECRET_KEY: test-secret-key-for-ci
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==
        run: uv run pytest --tb=short -q

  test-frontend:
    name: Frontend Tests
    needs: detect-changes
    if: |
      !cancelled()
      && (
        needs.detect-changes.result != 'success'
        || needs.detect-changes.outputs.web == 'true'
        || github.event_name == 'push'
      )
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  lint-backend:
    name: Backend Lint
    needs: detect-changes
    if: |
      !cancelled()
      && (
        needs.detect-changes.result != 'success'
        || needs.detect-changes.outputs.api == 'true'
        || github.event_name == 'push'
      )
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  lint-frontend:
    name: Frontend Lint
    needs: detect-changes
    if: |
      !cancelled()
      && (
        needs.detect-changes.result != 'success'
        || needs.detect-changes.outputs.web == 'true'
        || github.event_name == 'push'
      )
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  test-sidecar:
    name: Sidecar Tests
    needs: detect-changes
    if: |
      !cancelled()
      && (
        needs.detect-changes.result != 'success'
        || needs.detect-changes.outputs.sidecar == 'true'
        || github.event_name == 'push'
      )
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sidecar

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: sidecar/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
