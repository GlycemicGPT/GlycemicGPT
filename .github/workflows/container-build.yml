name: Build and Push Container Images

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'sidecar/**'
      - '.github/workflows/container-build.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all images'
        type: boolean
        default: false

# When a fallback release pushes version file changes to main AND creates a
# GitHub Release, both the push trigger (path match on package.json) and the
# release trigger fire simultaneously. The concurrency group ensures only the
# last-triggered build runs, avoiding duplicate container builds.
concurrency:
  group: container-build-${{ github.event_name }}-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/glycemicgpt

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      web: ${{ steps.changes.outputs.web }}
      sidecar: ${{ steps.changes.outputs.sidecar }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            sidecar:
              - 'sidecar/**'

  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      needs.detect-changes.outputs.api == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-

      - name: Build and push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || 'latest' }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.release.created_at }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      needs.detect-changes.outputs.web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_PREFIX }}-web
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-

      - name: Build and push Web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || 'latest' }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.release.created_at }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-sidecar:
    name: Build Sidecar Image
    runs-on: ubuntu-latest
    needs: detect-changes
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      needs.detect-changes.outputs.sidecar == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_PREFIX }}-sidecar
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-

      - name: Build and push Sidecar image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./sidecar
          file: ./sidecar/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event_name == 'release' && github.event.release.tag_name || 'latest' }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.release.created_at }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-release-tags:
    # Catches the v0.8.0 incident class: a release-event run "succeeded"
    # at the job level but one of the build-* jobs didn't push the
    # version-tagged image (most commonly because a build-time external
    # dependency timed out mid-build before tag push). When that happened
    # to the web image on v0.8.0, the release pipeline reported success
    # but `:0.8.0` resolved to 404. This step queries the registry after
    # the build jobs and fails loudly if any expected tag is missing OR
    # if version-related tags resolve to inconsistent digests for the
    # same image (e.g., 0.8.0 pointing at a different build than latest).
    name: Verify Release Tags Published
    runs-on: ubuntu-latest
    needs: [build-api, build-web, build-sidecar]
    # Only fire on the production release-please releases (semver-tagged,
    # not pre-release). The Dev Pre-Release workflow publishes a
    # `dev-latest` release whose container-build run also matches
    # github.event_name == 'release', but its images only carry sha-XXXX
    # tags (not semver), so verifying expected version tags on it would
    # always falsely fail.
    if: |
      github.event_name == 'release' &&
      github.event.release.prerelease == false
    timeout-minutes: 5
    concurrency:
      group: verify-release-tags-${{ github.event.release.tag_name }}
      cancel-in-progress: false
    permissions:
      packages: read
    steps:
      - name: Log in to ghcr.io (defense in depth for ever-private images)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Inspect each image for expected tags + digest consistency
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          # Case-preserved (e.g. "GlycemicGPT"). We MUST lowercase it
          # before constructing image references -- OCI registry refs are
          # case-sensitive and ghcr stores everything lowercase. See the
          # comment around IMAGE_PREFIX construction below.
          REPO_OWNER_RAW: ${{ github.repository_owner }}
        run: |
          set -uo pipefail

          REPO_OWNER_LC="${REPO_OWNER_RAW,,}"          # bash 4+ Unicode-aware lowercase
          IMAGE_PREFIX="ghcr.io/${REPO_OWNER_LC}/glycemicgpt"
          VERSION="${RELEASE_TAG#v}"                   # strip leading "v" -> 0.8.0

          # Gate: only verify semver-tagged production releases. Manual
          # releases (e.g., "feature-release-2026Q3") and any other
          # non-semver tags don't get the type=semver tags from
          # metadata-action, so verifying them here would always falsely
          # fail. The prerelease gate at the job level already excludes
          # the dev-pre-release workflow's pre-release; this additional
          # regex check catches future non-semver production releases.
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$ ]]; then
            echo "::notice::Release tag '${RELEASE_TAG}' is not semver-conformant; skipping version-tag verification. metadata-action only emits version tags for semver releases."
            exit 0
          fi

          # Tag responsibility split between the two trigger events that
          # fire for every release commit. This run (release event) is
          # responsible ONLY for the version + major.minor tags. The
          # parallel push-event run on the same SHA is responsible for
          # the `latest` tag (its metadata-action gates `latest` on
          # github.ref equalling refs/heads/main, which is only true for
          # the push event). Including `latest` in EXPECTED_TAGS here
          # would race that push-event run and falsely fail when the
          # release-event verify finishes first. If you want to verify
          # `latest` separately, add a push-event-gated verification job
          # in a follow-up.
          #
          # Major.minor (e.g. 0.8) is omitted for pre-release semver
          # (e.g. 0.8.0-rc.1), mirroring metadata-action's behaviour.
          #
          # NOTE: we deliberately avoid the literal ${ followed by {
          # syntax in this block. GitHub Actions interpolates expressions
          # in run: blocks BEFORE the shell sees them, even inside what
          # look like shell comments, so a multi-line broken expression
          # would crash the workflow at parse time.
          if [[ "$VERSION" == *-* ]]; then
            EXPECTED_TAGS=("$VERSION")
            echo "Pre-release version detected; not requiring major.minor tag."
          else
            EXPECTED_TAGS=("$VERSION" "${VERSION%.*}")
          fi

          FAILED=0
          for image in api web sidecar; do
            echo ""
            echo "=== ${IMAGE_PREFIX}-${image} ==="
            declare -A digests=()
            for tag in "${EXPECTED_TAGS[@]}"; do
              FULL="${IMAGE_PREFIX}-${image}:${tag}"
              # Retry to absorb GHCR propagation lag immediately after a fresh push.
              # 5 attempts with increasing backoff = ~30s total worst case.
              DIGEST=""
              for attempt in 1 2 3 4 5; do
                DIGEST=$(docker buildx imagetools inspect "$FULL" \
                         --format '{{.Manifest.Digest}}' 2>/dev/null || true)
                if [ -n "$DIGEST" ]; then break; fi
                echo "  attempt ${attempt}: ${tag} not yet resolvable (propagation lag?); sleeping..."
                sleep $((attempt * 2))
              done
              if [ -z "$DIGEST" ]; then
                echo "::error::Container tag missing after 5 retries: ${FULL}"
                echo "::error::The build-${image} job did not publish the '${tag}' tag for release ${RELEASE_TAG}. The GitHub Release object is already published; the container images for it are incomplete. Retag using crane or 'docker buildx imagetools create' (server-side, no layer transfer) once the underlying cause is understood."
                FAILED=1
                continue
              fi
              digests["$tag"]="$DIGEST"
              echo "  OK   ${tag} -> ${DIGEST}"
            done

            # All expected tags for a single image should resolve to the same digest.
            unique=$(printf '%s\n' "${digests[@]}" | sort -u | wc -l)
            if [ "$unique" -gt 1 ]; then
              echo "::error::Tags for ${IMAGE_PREFIX}-${image} resolve to DIFFERENT digests -- the release's version and major.minor tags are pointing at different builds:"
              for t in "${!digests[@]}"; do
                echo "::error::  ${t} -> ${digests[$t]}"
              done
              FAILED=1
            fi
          done

          echo ""
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Release tag verification failed for ${RELEASE_TAG}. Container images for this release are incomplete or inconsistent across tags. Investigate the build-* job logs and retag if needed before promoting the release downstream."
            exit 1
          fi
          echo "All expected release tags verified for ${RELEASE_TAG} -- every image has the same digest across version and major.minor (if applicable). Latest tag is the responsibility of the parallel push-event run; see the comment above EXPECTED_TAGS."

  update-release:
    name: Update Release Notes
    runs-on: ubuntu-latest
    needs: [build-api, build-web, build-sidecar, verify-release-tags]
    if: |
      always() &&
      github.event_name == 'release' &&
      !contains(needs.*.result, 'failure')
    steps:
      - name: Update release with container info
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const version = '${{ github.event.release.tag_name }}'.replace('v', '');
            // github.repository_owner is case-preserved (e.g. "GlycemicGPT"),
            // but OCI registry references MUST be lowercase. Without
            // .toLowerCase(), the release notes ship pull commands like
            // `docker pull ghcr.io/GlycemicGPT/...` that fail with
            // "invalid reference format". This is what shipped on v0.7.2.
            const imagePrefix = 'ghcr.io/${{ github.repository_owner }}/glycemicgpt'.toLowerCase();

            const containerSection = `

            ---

            ## 🐳 Container Images

            | Image | Tags |
            |-------|------|
            | \`${imagePrefix}-api\` | \`${version}\`, \`latest\` |
            | \`${imagePrefix}-web\` | \`${version}\`, \`latest\` |
            | \`${imagePrefix}-sidecar\` | \`${version}\`, \`latest\` |

            **Pull commands:**
            \`\`\`bash
            docker pull ${imagePrefix}-api:${version}
            docker pull ${imagePrefix}-web:${version}
            docker pull ${imagePrefix}-sidecar:${version}
            \`\`\`
            `;

            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id
            });

            // Only append if not already present
            if (!release.data.body.includes('Container Images')) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: context.payload.release.id,
                body: release.data.body + containerSection
              });
              console.log('Updated release notes with container info');
            }
