name: Attribution Check

# Detects AI-tool attribution in commits, code comments, and PR descriptions,
# then posts a sticky comment with findings (and auto-closes on CRITICAL).
#
# Triggered on `pull_request_target` so it works for fork PRs: that event
# runs in the base-repo context with full secret access and a writable
# GITHUB_TOKEN. We deliberately do NOT check out the PR head into the
# working tree -- instead we fetch the PR commits as a remote-only ref
# (`refs/remotes/pr-N/head`) so the working tree stays as the base. We
# then inspect commit messages and diff output as text only (grep, sed),
# never installing dependencies or executing PR-supplied code. This keeps
# the workflow safe against the "pwn-request" class of CVE even if future
# steps are added carelessly. See CONTRIBUTING.md "How CI handles fork PRs".

on:
  pull_request_target:
    branches: [main, develop]
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: attribution-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-attribution:
    name: Attribution Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout base ref (NOT the PR head)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # No `ref:` -- under pull_request_target the default is the base
          # ref of the PR's target branch. The PR's content stays out of
          # the working tree; we fetch its commits below into a remote
          # ref so `git log`/`git diff` can see them without materialising
          # any PR files on disk.
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch PR commits as remote-only ref
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Pull PR head into a remote ref. No checkout, no working-tree
          # materialisation -- text inspection only via the ref name.
          # Full history (no --depth) so PRs with hundreds of commits
          # can't slip a prohibited trailer past the scan by exceeding
          # a fetch-depth cap. Network cost is negligible for the
          # typical PR size in this repo.
          git fetch --no-tags origin \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/pr/${PR_NUMBER}"

      - name: Generate token for glycemicgpt-ci
        id: ci-token
        continue-on-error: true
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Detect AI attribution and classify severity
        id: detect
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Ensure the base ref is available
          git fetch origin "$BASE_REF" --depth=1 2>/dev/null || true

          PR_REF="refs/remotes/pr/${PR_NUMBER}"

          SEVERITY="NONE"
          FINDINGS=""

          # --- Bot whitelist (these never trigger findings) ---
          # IMPORTANT: each entry is anchored on a leading space so a
          # malicious co-author like "evildependabot[bot]" cannot
          # substring-match the legitimate "dependabot[bot]" entry. Trailer
          # format is `Co-Authored-By: <name> <<email>>`; the name is
          # always preceded by a space (after the colon), so the leading
          # space requirement matches legitimate names but not crafted
          # substrings of them.
          ALLOWED_BOTS=" (github-actions|coderabbitai|glycemicgpt-security|glycemicgpt-ci|glycemicgpt-release|glycemicgpt-merge|glycemicgpt-renovate|dependabot|homebot-0|gitguardian)\[bot\]"

          # --- AI tool names ---
          AI_TOOLS="claude|anthropic|copilot|chatgpt|openai|cursor|windsurf|codeium|codewhisperer|amazon\\.q|gemini|gemini\\.code\\.assist|jetbrains\\.ai|tabnine|sourcegraph|cody|devin|aider|codex"

          # --- Markdown-cell sanitiser: strip characters that could break out of
          # the | cell | cell | format or escape backtick-quoted code spans.
          sanitise_for_md() {
            printf '%s' "$1" | tr -d '`|\\' | tr -d '\r\n'
          }

          # =================================================================
          # Layer 1: Commit message trailers
          # =================================================================
          echo "=== Layer 1: Checking commit message trailers ==="
          COMMIT_MESSAGES=$(git log --format=%B "origin/${BASE_REF}..${PR_REF}" 2>/dev/null || true)

          # Check for bot account co-authors (CRITICAL if not whitelisted)
          BOT_TRAILERS=$(echo "$COMMIT_MESSAGES" | grep -iE "^Co-Authored-By:.*(\[bot\]|noreply@)" || true)
          if [ -n "$BOT_TRAILERS" ]; then
            while IFS= read -r line; do
              if ! echo "$line" | grep -qiE "$ALLOWED_BOTS"; then
                echo "  CRITICAL: Non-whitelisted bot co-author: $line"
                CLEAN=$(sanitise_for_md "$line")
                FINDINGS="${FINDINGS}| CRITICAL | commit trailer | \`${CLEAN}\` |\\n"
                SEVERITY="CRITICAL"
              fi
            done <<< "$BOT_TRAILERS"
          fi

          # Check for AI tool name co-authors (HIGH)
          TOOL_TRAILERS=$(echo "$COMMIT_MESSAGES" | grep -iE "^Co-Authored-By:.*(${AI_TOOLS})" || true)
          if [ -n "$TOOL_TRAILERS" ]; then
            # Filter out already-caught bot lines
            TOOL_ONLY=$(echo "$TOOL_TRAILERS" | grep -viE "(\[bot\]|noreply@)" || true)
            if [ -n "$TOOL_ONLY" ]; then
              while IFS= read -r line; do
                echo "  HIGH: AI tool co-author: $line"
                CLEAN=$(sanitise_for_md "$line")
                FINDINGS="${FINDINGS}| HIGH | commit trailer | \`${CLEAN}\` |\\n"
                [ "$SEVERITY" != "CRITICAL" ] && SEVERITY="HIGH"
              done <<< "$TOOL_ONLY"
            fi
          fi

          # Check for alternative attribution trailers (HIGH)
          ALT_TRAILERS=$(echo "$COMMIT_MESSAGES" | grep -iE "^(Authored-By|Generated-By|AI-Generated-By):" || true)
          if [ -n "$ALT_TRAILERS" ]; then
            while IFS= read -r line; do
              echo "  HIGH: Alternative attribution trailer: $line"
              CLEAN=$(sanitise_for_md "$line")
              FINDINGS="${FINDINGS}| HIGH | commit trailer | \`${CLEAN}\` |\\n"
              [ "$SEVERITY" != "CRITICAL" ] && SEVERITY="HIGH"
            done <<< "$ALT_TRAILERS"
          fi

          [ "$SEVERITY" = "NONE" ] && echo "  OK: No prohibited trailers found."
          echo ""

          # =================================================================
          # Layer 2: Code comments in changed files
          # =================================================================
          echo "=== Layer 2: Checking code comments in changed files ==="
          COMMENT_PHRASES="generated by|generated with|written by|created by|built with|copilot suggestion|ai-generated|ai generated"
          COMMENT_TOOLS_EXTRA="\\bai\\b|\\bgpt\\b"
          DIFF_OUTPUT=$(git diff "origin/${BASE_REF}...${PR_REF}" -- '*.py' '*.ts' '*.tsx' '*.js' '*.jsx' '*.kt' '*.java' '*.sh' 2>/dev/null || true)
          CODE_HITS=$(echo "$DIFF_OUTPUT" \
            | grep '^+' | grep -v '^+++' \
            | grep -inE "(${COMMENT_PHRASES}).*(${AI_TOOLS}|${COMMENT_TOOLS_EXTRA})" || true)
          if [ -n "$CODE_HITS" ]; then
            echo "$CODE_HITS" | head -5 | while IFS= read -r line; do
              echo "  MEDIUM: AI comment in code: $line"
            done
            FINDINGS="${FINDINGS}| MEDIUM | code comment | AI attribution in changed files ($(echo "$CODE_HITS" | wc -l) lines) |\\n"
            [ "$SEVERITY" = "NONE" ] && SEVERITY="MEDIUM"
          else
            echo "  OK: No AI attribution comments found."
          fi
          echo ""

          # =================================================================
          # Layer 3: PR description (strip CodeRabbit sections first)
          # =================================================================
          echo "=== Layer 3: Checking PR description ==="
          if [ -n "$PR_BODY" ]; then
            # Strip the CodeRabbit auto-generated footer ONLY when it is a
            # bracketed block at the trailing end of the body (opening marker
            # ... closing marker, then nothing but whitespace). Earlier
            # versions of this check stripped from the first occurrence of
            # either marker -- a contributor could bypass the scan by pasting
            # the marker before any AI-branding text. The bracketed end-anchored
            # form is much harder to abuse: a malicious early marker without a
            # matching trailing-only close-marker leaves the body intact.
            CLEAN_BODY=$(PR_BODY="$PR_BODY" python3 -c '
          import os, sys
          body = os.environ.get("PR_BODY", "")
          OPEN = "<!-- This is an auto-generated comment: release notes by coderabbit.ai -->"
          CLOSE = "<!-- end of auto-generated comment: release notes by coderabbit.ai -->"
          if OPEN in body and CLOSE in body:
              o = body.find(OPEN)
              c = body.rfind(CLOSE)
              if c > o and body[c + len(CLOSE):].strip() == "":
                  sys.stdout.write(body[:o])
                  sys.exit(0)
          sys.stdout.write(body)
          ')
            PR_PATTERN="generated with claude code|generated with.*(${AI_TOOLS})|built with.*\\bai\\b|claude\\.ai/claude-code|generated by (${AI_TOOLS})"
            if echo "$CLEAN_BODY" | grep -qiE "$PR_PATTERN"; then
              MATCH=$(echo "$CLEAN_BODY" | grep -iE "$PR_PATTERN" | head -1)
              echo "  HIGH: AI branding in PR description: $MATCH"
              FINDINGS="${FINDINGS}| HIGH | PR description | AI tool branding detected |\\n"
              [ "$SEVERITY" != "CRITICAL" ] && SEVERITY="HIGH"
            else
              echo "  OK: No AI branding in PR description."
            fi
          else
            echo "  OK: No PR body to check (push event)."
          fi
          echo ""

          # =================================================================
          # Write outputs for downstream steps
          # =================================================================
          echo "severity=${SEVERITY}" >> "$GITHUB_OUTPUT"
          echo "has_findings=$( [ "$SEVERITY" != "NONE" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

          # Write findings markdown to a file (multiline output)
          FINDINGS_FILE=$(mktemp)
          printf "%b" "$FINDINGS" > "$FINDINGS_FILE"
          echo "findings_file=${FINDINGS_FILE}" >> "$GITHUB_OUTPUT"

          # --- Final verdict ---
          echo "=== Result: severity=${SEVERITY} ==="
          if [ "$SEVERITY" != "NONE" ]; then
            echo "FAILED: AI attribution detected (${SEVERITY}). See CONTRIBUTING.md."
            exit 1
          fi
          echo "PASSED: No AI attribution found."

      - name: Post attribution findings to PR
        # Only post when detect actually produced a verdict. Without the
        # `severity != ''` gate, an early crash (fetch failure, shell error
        # inside detect) would leave SEVERITY empty and the script would
        # treat that as `!hasFindings` and publish a misleading
        # "Attribution Check: Passed" sticky comment. The workflow status
        # itself still surfaces the failure to maintainers.
        if: always() && steps.detect.outputs.severity != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          SEVERITY: ${{ steps.detect.outputs.severity }}
          HAS_FINDINGS: ${{ steps.detect.outputs.has_findings }}
          FINDINGS_FILE: ${{ steps.detect.outputs.findings_file }}
        with:
          github-token: ${{ steps.ci-token.outputs.token || secrets.GITHUB_TOKEN }}
          script: |
            const severity = process.env.SEVERITY;
            const hasFindings = process.env.HAS_FINDINGS === 'true';
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) return;

            const marker = '<!-- attribution-check-comment -->';
            const repo = context.repo;

            // Find existing comment -- paginate so we don't miss the
            // sticky marker on PRs with >100 comments (single-page lookup
            // would otherwise create duplicate sticky comments instead of
            // updating the existing one).
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { ...repo, issue_number: prNumber, per_page: 100 },
            );
            const existing = comments.find(c =>
              c.body?.includes(marker)
            );

            let body;

            if (!hasFindings) {
              // Clean run -- positive reinforcement
              body = [
                marker,
                '## :white_check_mark: Attribution Check: Passed',
                '',
                'No AI attribution detected across commits, code, and PR description.',
                'Thanks for keeping our repo clean and taking ownership of your work.',
                '',
                `[Attribution Policy](https://github.com/${repo.owner}/${repo.repo}/blob/develop/CONTRIBUTING.md#no-ai-attribution-in-code) | [Install commit-msg hook](https://github.com/${repo.owner}/${repo.repo}/blob/develop/CONTRIBUTING.md#-quick-start-webapi----recommended-for-most-contributors)`,
              ].join('\n');
            } else {
              // Findings detected -- severity + instructions
              const fs = require('fs');
              const findingsFile = process.env.FINDINGS_FILE;
              let findingsTable = '';
              try { findingsTable = fs.readFileSync(findingsFile, 'utf8').trim(); } catch {}

              const emoji = {
                CRITICAL: ':red_circle:',
                HIGH: ':orange_circle:',
                MEDIUM: ':yellow_circle:',
              }[severity] || ':grey_question:';

              let instructions = '';
              if (severity === 'CRITICAL') {
                instructions = [
                  '**This PR has been automatically closed** due to CRITICAL attribution violations. A non-whitelisted bot or AI tool was detected as a commit co-author, which becomes a permanent participant in the PR history and cannot be removed.',
                  '',
                  'To resubmit your changes:',
                  '1. Create a new branch from `develop`',
                  '2. Cherry-pick your changes **without** the prohibited co-author trailers',
                  '3. Open a new PR',
                  '',
                  'If this bot is legitimate project infrastructure (not an AI coding tool), request it be added to the [attribution whitelist](https://github.com/' + repo.owner + '/' + repo.repo + '/blob/develop/CONTRIBUTING.md#bot-whitelist) by opening an issue.',
                ].join('\n');
              } else {
                const parts = [];
                if (findingsTable.includes('HIGH')) {
                  parts.push('**HIGH findings** (commit trailers / PR description): Use `git rebase -i` to amend affected commits and remove the trailers, then force push. Edit the PR description to remove AI branding.');
                }
                if (findingsTable.includes('MEDIUM')) {
                  parts.push('**MEDIUM findings** (code comments): Remove the AI attribution comments in a follow-up commit and push.');
                }
                instructions = parts.join('\n\n');
              }

              body = [
                marker,
                `## ${emoji} Attribution Check: ${severity === 'CRITICAL' ? 'PR Closed (CRITICAL)' : severity}`,
                '',
                `AI tool attribution detected in this PR. See our [attribution policy](https://github.com/${repo.owner}/${repo.repo}/blob/develop/CONTRIBUTING.md#no-ai-attribution-in-code).`,
                '',
                '### Findings',
                '',
                '| Severity | Location | Finding |',
                '|----------|----------|---------|',
                findingsTable,
                '',
                '### How to Fix',
                '',
                instructions,
                '',
                '---',
                'Install the commit-msg hook to prevent this automatically:',
                '```',
                'cp scripts/hooks/commit-msg .git/hooks/commit-msg && chmod +x .git/hooks/commit-msg',
                '```',
              ].join('\n');
            }

            // Upsert: update existing or create new
            if (existing) {
              await github.rest.issues.updateComment({
                ...repo, comment_id: existing.id, body,
              });
              console.log('Updated attribution comment');
            } else {
              await github.rest.issues.createComment({
                ...repo, issue_number: prNumber, body,
              });
              console.log('Created attribution comment');
            }

      - name: Auto-close PR on CRITICAL attribution violation
        # Skip auto-close ONLY for the internal develop->main promotion PR
        # (same repo AND head ref is literally `develop`). Without the
        # same-repo guard, a fork contributor could bypass auto-close by
        # naming their fork branch `develop`.
        # Also implicitly requires detect.outputs.severity to be populated
        # (`== 'CRITICAL'` is false when the output is empty), so an early
        # crash in detect cannot accidentally trigger an auto-close either.
        if: >-
          always() && steps.detect.outputs.severity == 'CRITICAL' &&
          !(
            github.event.pull_request.head.ref == 'develop' &&
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ steps.ci-token.outputs.token || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) return;
            await github.rest.pulls.update({
              ...context.repo,
              pull_number: prNumber,
              state: 'closed',
            });
            console.log(`Auto-closed PR #${prNumber} due to CRITICAL AI attribution violation`);
