name: Workflow Lint

# Static analysis of GitHub Actions workflow files using zizmor.
# Defends against compromised/misconfigured workflows that could leak
# CI secrets (the same class of attack as the tj-actions/changed-files
# and reviewdog 2025 incidents).
#
# zizmor catches:
#   - Untrusted input flowing into shell commands (template injection)
#   - Excessive permissions: grants
#   - Dangerous pull_request_target patterns (fork code execution)
#   - Cache poisoning patterns
#   - Self-hosted runner risks
#   - Action references that evaluate at runtime
#
# ROLLOUT STATUS: ADVISORY (does not fail builds).
# zizmor surfaces findings on the existing workflow corpus that need to
# be triaged in follow-up PRs (template injection, excessive permissions,
# cache poisoning, missing persist-credentials: false). Once the baseline
# is clean, this gate will be tightened to fail on errors, then warnings,
# then registered as a required status check on develop. Tracking issue
# will be filed once this PR lands.

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Workflow Lint Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # No git-push needed -- zizmor only reads files. Disabling
          # token persistence reduces exposure when the step's external
          # tooling (pip + zizmor) runs.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install zizmor
        run: pip install zizmor==1.5.2

      - name: Run zizmor (advisory)
        # ADVISORY MODE: does not fail the build. We collect findings,
        # post a summary, and upload SARIF for review. Tighten to a
        # failing gate once baseline findings are triaged.
        run: |
          set +e
          zizmor --persona=auditor --format sarif .github/workflows/ > zizmor.sarif
          ZIZMOR_EXIT=$?
          # Always also print the human-readable output so it shows in run logs
          zizmor --persona=auditor .github/workflows/ || true
          echo "::notice::zizmor exited with $ZIZMOR_EXIT (advisory mode -- not failing build)"
          # Summary counts for visibility
          if [ -s zizmor.sarif ]; then
            python3 -c "
          import json
          with open('zizmor.sarif') as f:
              data = json.load(f)
          counts = {}
          for run in data.get('runs', []):
              for r in run.get('results', []):
                  level = r.get('level', 'unknown')
                  counts[level] = counts.get(level, 0) + 1
          for level, n in sorted(counts.items()):
              print(f'::notice::zizmor {level}: {n}')
          " || true
          fi
          exit 0

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zizmor-sarif
          path: zizmor.sarif
          if-no-files-found: ignore
          retention-days: 30

      # ---------------------------------------------------------------
      # Drift guard: prevent re-introduction of patterns we explicitly
      # removed for fork-PR compatibility. These are concrete bug-class
      # regressions, not advisory style issues -- this step FAILS the
      # workflow (unlike zizmor which is advisory-only).
      # ---------------------------------------------------------------
      - name: Drift guard for fork-PR compatibility
        # NOTE: this step excludes workflow-lint.yml itself from its
        # scans -- the linter mentions the forbidden patterns in error
        # messages, which would otherwise cause a self-flagging loop.
        run: |
          set -e
          FAILED=0
          SELF="workflow-lint.yml"

          # 1. SECURITY_TEST_PASSWORD must not return as a repo secret.
          # The CI fixture lives as a workflow-level env literal; using
          # ${{ secrets.SECURITY_TEST_PASSWORD }} again would re-break
          # fork PRs (the secret is empty on fork-triggered runs, which
          # then 422s when smoke tests try to register a user).
          if grep -rn --exclude="$SELF" -E 'secrets\.SECURITY_TEST_PASSWORD' .github/workflows/; then
            echo "::error::secrets.SECURITY_TEST_PASSWORD must not be used. Set TEST_PASSWORD as a workflow-level env literal instead; see security-scan.yml. Fork PRs cannot read repo secrets."
            FAILED=1
          fi

          # 2. CI_APP_ID / CI_APP_PRIVATE_KEY must only appear in workflows
          # triggered by safe events (push, schedule, workflow_dispatch,
          # workflow_run, or pull_request_target -- NEVER plain pull_request,
          # which leaks an empty secret on fork PRs and crashes the token
          # generation step).
          for f in $(grep -l --exclude="$SELF" -E 'secrets\.CI_APP_(ID|PRIVATE_KEY)' .github/workflows/*.yml || true); do
            # If the workflow has `on: pull_request:` (not _target), flag it.
            # Use python for proper YAML inspection rather than a fragile grep.
            python3 -c "
          import sys, yaml
          with open('$f') as fp:
              doc = yaml.safe_load(fp)
          # PyYAML parses bareword 'on' as boolean True
          triggers = doc.get('on') or doc.get(True) or {}
          if isinstance(triggers, dict) and 'pull_request' in triggers:
              print(f'::error file=$f::secrets.CI_APP_* used in a workflow triggered by pull_request. Fork PRs do not receive secrets -- use pull_request_target (with a safe checkout pattern) or workflow_run instead.')
              sys.exit(1)
          " || FAILED=1
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Drift guard failed -- see annotations above."
            exit 1
          fi
          echo "Drift guard passed."
