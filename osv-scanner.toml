# OSV-Scanner configuration
# https://google.github.io/osv-scanner/configuration/

# Suppress known false positives or accepted risks here.
# Each entry requires a reason explaining why it's safe to ignore.
# Review suppressions quarterly.

# ecdsa 0.19.1 -- no fix available. Used transitively by python-jose
# for JWT signing. We use HMAC (HS256), not ECDSA, so the Minerva
# timing attack is not exploitable in our usage.
[[IgnoredVulns]]
id = "GHSA-wj6h-64fc-37mp"
reason = "No fix available; not exploitable -- we use HMAC signing, not ECDSA"

# @tootallnate/once 2.0.0 -- dev-only transitive dependency
# (jest-environment-jsdom -> jsdom -> http-proxy-agent). Not in
# production builds. npm audit fix requires breaking jsdom upgrade.
[[IgnoredVulns]]
id = "GHSA-vpq2-c234-7xj6"
reason = "Dev-only dependency (jest toolchain), not in production; fix requires breaking jsdom upgrade"

# brace-expansion 1.1.12 / 2.0.2 -- dev-only transitive dependency
# (minimatch -> brace-expansion in jest/eslint toolchain). Fix requires
# major version jump to 5.0.5 which breaks parent packages. Not in production.
[[IgnoredVulns]]
id = "GHSA-f886-m6hf-6m8v"
reason = "Dev-only transitive dependency (jest/eslint toolchain); fix requires breaking major version upgrade; not in production builds"

# pygments 2.19.2 -- latest available version, no fix released yet.
# Low severity (CVSS 3.3). ReDoS in specific lexer patterns; not
# exploitable in our usage (server-side syntax highlighting only).
[[IgnoredVulns]]
id = "GHSA-5239-wwwm-4pmq"
reason = "No fix available (2.19.2 is latest); low severity ReDoS; not exploitable in our server-side usage"

# postcss 8.4.31 -- nested inside next (apps/web/node_modules/next/node_modules/postcss).
# Next bundles its own postcss for build-time CSS compilation. The CVE is XSS via
# unescaped </style> in CSS Stringify Output -- requires processing untrusted CSS
# through postcss with the output rendered to a user. Our app does not process user
# CSS through next's build pipeline; only static authored CSS files are compiled.
# next's overrides cannot be applied without breaking next's internal version pin.
# Top-level postcss is already at 8.5.13 (clear).
# TODO: Remove this suppression after next ships a release with bundled postcss >= 8.5.10
[[IgnoredVulns]]
id = "GHSA-qx2v-qp2m-jg93"
reason = "Nested only inside next; build-time CSS pipeline does not process untrusted CSS; top-level postcss is patched to 8.5.13"
